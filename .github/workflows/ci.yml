name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  swift:
    name: Swift Package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Build for iOS
        run: xcodebuild -scheme VerticalSemaphore -destination 'generic/platform=iOS' build CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: swift test
